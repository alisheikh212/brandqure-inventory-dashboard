<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom Input Styles to match Brand Guidelines */
        .brand-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            background-color: var(--color-surface-container-lowest, #ffffff);
            border: 1px solid var(--color-outline-variant, #c6c6cd);
            border-radius: 0.25rem;
            color: var(--color-on-surface, #111c2d);
            transition: all 0.2s ease-in-out;
        }
        .brand-input:focus {
            outline: none;
            border-color: #2f2ebe; /* on-tertiary-fixed-variant acting as Primary Blue */
            box-shadow: 0 0 0 3px rgba(47, 46, 190, 0.15);
        }
        .brand-input::placeholder {
            color: var(--color-outline, #76777d);
        }

<body class="bg-background min-h-screen font-body-md text-on-background antialiased overflow-hidden relative">
<!-- Simulated background dashboard context (blurred out) -->
<div class="absolute inset-0 pointer-events-none opacity-20 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMSIgZmlsbD0iIzAwMCIvPjwvc3ZnPg==')]"></div>
<!-- Modal Overlay Backdrop -->
<div aria-modal="true" class="fixed inset-0 z-50 flex items-center justify-center bg-inverse-surface/60 backdrop-blur-sm p-4 sm:p-6" role="dialog">
<!-- Modal Container -->
<div class="w-full max-w-lg bg-surface-container-lowest rounded-xl shadow-[0_20px_25px_-5px_rgba(0,0,0,0.1),0_8px_10px_-6px_rgba(0,0,0,0.1)] flex flex-col overflow-hidden animate-in fade-in zoom-in duration-200">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-outline-variant/40">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-surface-container-high flex items-center justify-center text-on-tertiary-fixed-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="inventory_2">inventory_2</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface">Add Ordered Units</h2>
</div>
<button aria-label="Close modal" class="p-2 rounded-full text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface transition-colors focus:outline-none focus:ring-2 focus:ring-on-tertiary-fixed-variant/50" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
</div>
<!-- Body / Form -->
<div class="px-6 py-6 flex flex-col gap-6">
<!-- SKU Selection -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="sku-select">SKU Selection</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px] pointer-events-none" data-icon="search">search</span>
<select class="brand-input pl-10 appearance-none bg-no-repeat font-body-md text-body-md" id="sku-select" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2376777d%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E'); background-position: right 12px center; background-size: 16px;">
<option disabled="" selected="" value="">Search or select a SKU...</option>
<option value="sku-1">PRD-WH-001 (Premium Widget - White)</option>
<option value="sku-2">PRD-BK-002 (Premium Widget - Black)</option>
<option value="sku-3">ACC-BL-105 (Accessory Pack - Blue)</option>
</select>
</div>
</div>
<!-- 2-Column Grid for PO & Units -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
<!-- PO Number -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="po-number">PO Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px] pointer-events-none" data-icon="receipt_long">receipt_long</span>
<input class="brand-input pl-10 font-body-md text-body-md" id="po-number" placeholder="e.g. PO-2024-089" type="text"/>
</div>
</div>
<!-- Units Ordered -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="units-ordered">Units Ordered</label>
<div class="relative">
<input class="brand-input pr-12 font-numeric-data text-numeric-data text-right" id="units-ordered" min="1" placeholder="0" type="number"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none">
<span class="font-label-sm text-label-sm text-outline-variant">PCS</span>
</div>
</div>
</div>
</div>
<!-- Expected Arrival Date -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="arrival-date">Expected Arrival Date</label>
<div class="relative">
<input class="brand-input font-body-md text-body-md" id="arrival-date" type="date"/>
</div>
<p class="font-label-sm text-label-sm text-outline mt-1">This will plot the incoming inventory on your forecasting timeline.</p>
</div>
</div>
<!-- Footer Actions -->
<div class="px-6 py-5 border-t border-outline-variant/40 bg-surface-bright/50 flex flex-col-reverse sm:flex-row justify-end gap-3">
<button class="inline-flex items-center justify-center px-5 py-2.5 rounded-lg border border-outline-variant bg-transparent text-on-surface font-label-md text-label-md transition-all duration-200 hover:bg-surface-container-highest focus:outline-none focus:ring-2 focus:ring-outline/50" type="button">
                    Cancel
                </button>
<button class="inline-flex items-center justify-center gap-2 px-6 py-2.5 rounded-lg bg-gradient-to-r from-on-tertiary-fixed-variant to-tertiary-container text-white font-label-md text-label-md transition-all duration-200 hover:shadow-[0_4px_14px_0_rgba(7,0,108,0.25)] hover:opacity-95 focus:outline-none focus:ring-2 focus:ring-on-tertiary-fixed-variant focus:ring-offset-2" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="add_task">add_task</span>
                    Add to Timeline
                </button>
</div>
</div>
</div>
</body></html>
